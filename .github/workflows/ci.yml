name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint with luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "luajit-2.1"

      - name: Setup luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luvit
        run: luarocks install luvit

      - name: Install dependencies
        run: luarocks install coro-http coro-websocket secure-socket json

      - name: Install luacheck
        run: luarocks install luacheck

      - name: Run luacheck
        run: luacheck --no-unused-args .

  test:
    name: Run busted tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "luajit-2.1"

      - name: Setup luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install luvit
        run: luarocks install luvit

      - name: Install test dependencies
        run: luarocks install busted

      - name: Run busted tests
        run: busted -p "_test.lua" -p "_spec.lua" -r spec

  rockspec:
    name: Validate rockspec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "luajit-2.1"

      - name: Setup luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Validate rockspec
        run: luarocks lint discord-lua-scm-0.rockspec
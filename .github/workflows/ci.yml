name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint with luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua/LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libluajit-5.1-dev luarocks
          sudo luarocks config --scope system lua_interpreter luajit
          sudo luarocks config --scope system variables.LUA_INCDIR /usr/include/luajit-2.1

      - name: Install luvit
        run: sudo luarocks install luvit

      - name: Install dependencies
        run: sudo luarocks install coro-http coro-websocket secure-socket json

      - name: Install luacheck
        run: sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck --no-unused-args .

  test:
    name: Run busted tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua/LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libluajit-5.1-dev luarocks
          sudo luarocks config --scope system lua_interpreter luajit
          sudo luarocks config --scope system variables.LUA_INCDIR /usr/include/luajit-2.1

      - name: Install luvit
        run: sudo luarocks install luvit

      - name: Install test dependencies
        run: sudo luarocks install busted

      - name: Run busted tests
        run: busted -p "_test.lua" -p "_spec.lua" -r spec

  rockspec:
    name: Validate rockspec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua/LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit libluajit-5.1-dev luarocks
          sudo luarocks config --scope system lua_interpreter luajit
          sudo luarocks config --scope system variables.LUA_INCDIR /usr/include/luajit-2.1

      - name: Validate rockspec
        run: luarocks lint discord-lua-scm-0.rockspec